*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans SC",sans-serif;background:#f5f5f5;color:#333;line-height:1.7;}
header{background:#fff;border-bottom:1px solid #ddd;}
header h1{font-size:26px;font-weight:600;color:#222;margin-bottom:2px;}
header .sub{font-size:14px;color:#888;}

.container{max-width:1100px;margin:0 auto;padding:32px 24px 60px;}
.sec{margin-bottom:40px;}
.sec-title{font-size:15px;font-weight:600;color:#999;letter-spacing:2px;padding-bottom:8px;border-bottom:2px solid #ddd;margin-bottom:16px;}
.sec-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.sec-hdr .name{font-size:15px;font-weight:600;color:#333;}
.sec-hdr .dl{font-size:12px;color:#888;padding:4px 12px;border:1px solid #ddd;border-radius:4px;text-decoration:none;}
.sec-hdr .dl:hover{border-color:#999;color:#333;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:6px;margin-bottom:24px;}
.grid img{width:100%;display:block;border:1px solid #ddd;border-radius:4px;cursor:pointer;}
.grid img:hover{border-color:#999;}
.r-box{background:#fff;border:1px solid #ddd;border-radius:6px;overflow:hidden;max-width:460px;}
.r-box img{width:100%;display:block;}
.r-box .d{padding:12px 16px;text-align:center;border-top:1px solid #eee;}
.r-box .d a{display:inline-block;padding:8px 22px;background:#333;color:#fff;border-radius:4px;font-size:13px;text-decoration:none;}
.r-box .d a:hover{background:#555;}
.c-box{background:#fff;border:1px solid #ddd;border-radius:6px;padding:20px 24px;max-width:460px;}
.c-box .r{padding:5px 0;font-size:14px;color:#555;}
.c-box .l{color:#999;display:inline-block;width:56px;}
footer{text-align:center;padding:24px;font-size:12px;color:#bbb;border-top:1px solid #ddd;}
.lightbox{display:none;position:fixed;z-index:9999;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.92);justify-content:center;align-items:center;}
.lightbox.show{display:flex;}
.lightbox .wrap{position:relative;display:flex;align-items:center;justify-content:center;max-width:95vw;max-height:95vh;}
.lightbox img{max-width:92vw;max-height:88vh;object-fit:contain;border-radius:6px;}
.lightbox .x{position:fixed;top:18px;right:24px;font-size:30px;color:#888;background:none;border:none;cursor:pointer;width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:sans-serif;}
.lightbox .x:hover{color:#fff;background:rgba(255,255,255,0.1);}
.lightbox .arrow{position:fixed;top:50%;transform:translateY(-50%);width:48px;height:48px;border-radius:50%;background:rgba(255,255,255,0.06);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:24px;color:#888;font-family:sans-serif;z-index:10;}
.lightbox .arrow:hover{color:#fff;background:rgba(255,255,255,0.14);}
.lightbox .arrow.prev{left:16px;}
.lightbox .arrow.next{right:16px;}
.lightbox .counter{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);color:#999;font-size:14px;background:rgba(0,0,0,0.5);padding:5px 16px;border-radius:16px;}
@media(max-width:700px){.grid{grid-template-columns:repeat(2,1fr);}header{flex-direction:column!important;text-align:center!important;padding:24px 20px!important;}header>div:last-child{display:none!important;}.lightbox .arrow{width:36px;height:36px;font-size:18px;}.lightbox .arrow.prev{left:4px;}.lightbox .arrow.next{right:4px;}}@media(max-width:700px){.sec>div{flex-direction:column!important;gap:20px!important;}.sec>div>div:last-child{margin-left:0!important;text-align:center!important;width:100%!important;}}
</style>

<div class="lightbox" id="LB">
<div class="wrap">
<img id="LBimg" src="">
</div>
<button class="x" id="LBx">&times;</button>
<button class="arrow prev" id="LBprev">&lsaquo;</button>
<button class="arrow next" id="LBnext">&rsaquo;</button>
<div class="counter" id="LBc"></div>
</div>
<script>
var LB=document.getElementById("LB"),IM=document.getElementById("LBimg"),CX=document.getElementById("LBx"),PR=document.getElementById("LBprev"),NX=document.getElementById("LBnext"),CN=document.getElementById("LBc");
var grp=null,idx=0,imgs={};
document.querySelectorAll(".grid img").forEach(function(m){var g=m.dataset.g;if(!imgs[g])imgs[g]=[];imgs[g].push(m.src);
m.onclick=function(){grp=g;idx=parseInt(this.dataset.i);show();};
});
function show(){if(!grp||!imgs[grp])return;upd();LB.classList.add("show");document.body.style.overflow="hidden";}
function hide(){LB.classList.remove("show");document.body.style.overflow="";}
function prv(){if(!grp)return;var a=imgs[grp];idx=(idx-1+a.length)%a.length;upd();}
function nxt(){if(!grp)return;var a=imgs[grp];idx=(idx+1)%a.length;upd();}
function upd(){var a=imgs[grp];IM.src=a[idx];CN.textContent=(idx+1)+" / "+a.length;}
CX.onclick=hide;
LB.onclick=function(e){if(e.target===LB)hide();};
PR.onclick=function(e){e.stopPropagation();prv();};
NX.onclick=function(e){e.stopPropagation();nxt();};
document.addEventListener("keydown",function(e){if(!LB.classList.contains("show"))return;if(e.key==="Escape")hide();if(e.key==="ArrowLeft")prv();if(e.key==="ArrowRight")nxt();});
</script>
